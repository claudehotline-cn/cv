run:
  experiment: cv-classification
  run_name: resnet18-baseline
  seed: 42
  device: cpu

data:
  format: image_folder
  train_dir: ""
  val_dir: ""
  num_classes: 2
  aug: none

model:
  arch: resnet18
  pretrained: true

train:
  epochs: 5
  batch_size: 16
  lr: 0.001
  optimizer: adamw

export:
  onnx: true
  opset: 17
  dynamic_axes: false
  input_size: [1,3,224,224]

register:
  model_name: cv/resnet18
  promote: none

