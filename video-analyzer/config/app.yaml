engine:
  type: ort-cuda
  device: 0
  options:
    # Default to FFmpeg RTSP source for better stability on Windows
    use_multistage: true
    graph_id: analyzer_multistage_example
    use_ffmpeg_source: false
    use_nvdec: false
    trt_fp16: true
    trt_workspace_mb: 2048
sfu:
  whip_base: ""
  whep_base: ""
orchestration:
  idle_timeout_ms: 60000
  reap_interval_ms: 5000
defaults:
  decoder:
    impl: ffmpeg
    rtsp:
      prefer_tcp: true
      timeout_ms: 5000
  encoder:
    impl: ffmpeg_h264
    width: 1280
    height: 720
    fps: 30
    bitrate_kbps: 3500
    gop: 60
    bframes: 0
    preset: veryfast
    tune_zerolatency: true
security:
  allowed_source_schemes:
    - rtsp
    - rtsps
  switch_limits:
    source_per_stream_per_sec: 0.2
    model_per_stream_per_sec: 0.5
observability:
  log_level: info # info|debug|trace|warn|error
  log_format: text # text|json
  module_levels: 
    transport.webrtc: info                                                                
    encoder.ffmpeg: info                                                                        
  console: true
  file:
    path: D:\Projects\ai\cv\logs\video-analyzer-release.log
    max_size_kb: 10240
    max_files: 5
  pipeline_metrics:
    enabled: true
    interval_ms: 5000
  metrics:
    prom_endpoint: "0.0.0.0:9090"
    extended_labels: true
    registry_enabled: true
control_plane:
  enabled: false
  grpc_addr: "0.0.0.0:50051"
  metrics_enabled: false
