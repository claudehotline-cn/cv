engine:
  type: ort-cuda
  provider: cuda
  device: 0
  options:
    # Default to FFmpeg RTSP source for better stability on Windows
    use_ffmpeg_source: false
    use_nvdec: true
    use_nvenc: true
    use_multistage: true
    use_io_binding: true
    device_output_views: true
    stage_device_outputs: false
    use_cuda_nms: true
    render_passthrough: false
    render_cuda: true
    use_cuda_preproc: true
    graph_id: analyzer_multistage_example
    warmup_runs: auto
    overlay_thickness: 3                                                       
    overlay_alpha: 0.25
    trt_fp16: true
    trt_workspace_mb: 2048
sfu:
  whip_base: ""
  whep_base: ""
orchestration:
  idle_timeout_ms: 60000
  reap_interval_ms: 5000
defaults:
  decoder:
    impl: ffmpeg
    rtsp:
      prefer_tcp: true
      timeout_ms: 5000
  encoder:
    impl: ffmpeg_h264
    width: 1280
    height: 720
    fps: 30
    bitrate_kbps: 3500
    # gop: 30
    bframes: 0
    preset: veryfast
    tune_zerolatency: true
security:
  allowed_source_schemes:
    - rtsp
    - rtsps
  switch_limits:
    source_per_stream_per_sec: 0.2
    model_per_stream_per_sec: 0.5
observability:
  log_level: debug # info|debug|trace|warn|error
  log_format: text # text|json
  module_levels: 
    transport.webrtc: debug                                                                
    encoder.ffmpeg: debug                                                                        
  console: true
  file:
    path: D:\Projects\ai\cv\logs\video-analyzer-release.log
    max_size_kb: 10240
    max_files: 5
  pipeline_metrics:
    enabled: true
    interval_ms: 5000
  metrics:
    prom_endpoint: "0.0.0.0:9090"
    extended_labels: true
    registry_enabled: true

# Database configuration (MySQL)
database:
  driver: mysql
  host: 127.0.0.1
  port: 13306
  user: root
  password: "123456"
  db: cv_cp
  pool:
    min: 4
    max: 16
    timeout_ms: 2000
  retention:
    enabled: false        # 是否启用定期清理（默认关闭）
    events_seconds: 86400 # 事件保留时长（秒），0 表示不清理
    logs_seconds: 86400   # 日志保留时长（秒），0 表示不清理
    interval_seconds: 600 # 清理周期（秒）
    jitter_percent: 10    # 抖动百分比，避免同时触发
control_plane:
  enabled: true
  grpc_addr: "0.0.0.0:50051"
  vsm_addr: "127.0.0.1:7070"
  metrics_enabled: true
subscriptions:
  heavy_slots: 2
  model_slots: 2
  rtsp_slots: 4
  open_rtsp_slots: 2
  load_model_slots: 2
  start_pipeline_slots: 2
  max_queue: 1024
  ttl_seconds: 900

quotas:
  enabled: true
  header_key: "X-API-Key"
  default:
    concurrent: 1
    rate_per_min: 1
  global:
    concurrent: 100
  acl:
    allowed_schemes: ["rtsp", "rtsps"]
    allowed_profiles: ["det_720p", "seg_720p"]
  # 灰度与白名单（M2）
  observe_only: false      # true 则仅观测 would_drop，不实际拦截
  enforce_percent: 100     # 0..100 按百分比采样拦截
  exempt_keys: []          # 免配额/ACL 的 keys
  key_overrides: []        # 形如：[{ key: "vip-001", concurrent: 5, rate_per_min: 60 }]
  # 也可按 key 进行灰度：observe_only / enforce_percent（覆盖全局）
  # 例：
  # key_overrides:
  #   - key: "vip-observe"
  #     observe_only: true
  #   - key: "vip-canary"
  #     enforce_percent: 50   # 对该 key 仅 50% 请求执行拦截
