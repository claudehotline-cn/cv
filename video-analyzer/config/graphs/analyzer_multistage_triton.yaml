analyzer:
  multistage:
    nodes:
      - name: pre
        type: preproc.letterbox
        params: { out_w: "640", out_h: "640", use_cuda: "1" }
      - name: det
        # 使用当前 Engine provider 决策模型会话；当 provider=triton 时，忽略 model_path
        type: model
        params: { in: "tensor:det_input", outs: "tensor:det_raw" }
      - name: nms
        type: post.yolo.nms
        params: { conf: "0.65", iou: "0.45" }
      - name: ovl
        type: overlay.cuda
        params: { alpha: "0.2", thickness: "3" }
    edges:
      - [pre, det]
      - [det, nms]
      - [nms, ovl]

