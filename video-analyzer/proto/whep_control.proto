syntax = "proto3";

package va.whep;

// WHEP (WebRTC-HTTP Egress Protocol) control surface for CP→VA negotiation.
service WhepControl {
  // Create a WHEP session from SDP Offer; returns Answer SDP and session id.
  rpc AddWhepSession(AddWhepSessionRequest) returns (AddWhepSessionReply);
  // Apply trickle ICE SDP fragment to an existing session.
  rpc PatchWhepCandidate(PatchWhepCandidateRequest) returns (PatchWhepCandidateReply);
  // Delete a WHEP session by id.
  rpc DeleteWhepSession(DeleteWhepSessionRequest) returns (DeleteWhepSessionReply);
}

message AddWhepSessionRequest {
  string stream_id = 1; // normalized stream key (e.g., "cam01")
  string offer_sdp = 2; // browser SDP offer
}

message AddWhepSessionReply {
  bool   ok = 1;
  string msg = 2;
  string session_id = 3; // internal sid
  string answer_sdp = 4; // server SDP answer
}

message PatchWhepCandidateRequest {
  string session_id = 1;
  string sdp_frag = 2; // application/trickle-ice-sdpfrag contents
}

message PatchWhepCandidateReply { bool ok = 1; string msg = 2; }

message DeleteWhepSessionRequest { string session_id = 1; }
message DeleteWhepSessionReply  { bool ok = 1; string msg = 2; }

