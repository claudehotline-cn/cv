name: Controlplane Smoke

on:
  push:
  pull_request:

jobs:
  smoke-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Setup vcpkg
        uses: microsoft/setup-vcpkg@v1
        with:
          vcpkgTriplet: x64-windows
          appendEnv: true

      - name: Ensure Ninja
        run: choco install ninja -y

      - name: Run smoke (Min mode, TLS config)
        shell: pwsh
        env:
          CP_SMOKE_MIN: '1'
          CP_TEST_WATCH: '0'
        run: |
          $ErrorActionPreference = 'Stop'
          $log = Join-Path $env:RUNNER_TEMP 'cp_smoke.log'
          tools/run_cp_smoke.ps1 -BaseUrl 'http://127.0.0.1:18080' -CfgDir 'controlplane/config' *>&1 | Tee-Object -FilePath $log
          echo "Saved log: $log"

      - name: Build grpc_mtls_probe (for mTLS tests)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vroot = $env:VCPKG_ROOT
          if (-not $vroot) { $vroot = $env:VCPKG_INSTALLATION_ROOT }
          cmake -S tools/grpc_mtls_probe -B tools/grpc_mtls_probe/build -G Ninja -DCMAKE_TOOLCHAIN_FILE="${vroot}/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build tools/grpc_mtls_probe/build -j 2

      - name: Run mTLS connectivity tests (positive & negative)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pos = Join-Path $env:RUNNER_TEMP 'mtls_positive.log'
          $neg = Join-Path $env:RUNNER_TEMP 'mtls_negative.log'
          pwsh -ExecutionPolicy Bypass -File tools/test_mtls_connectivity.ps1 *>&1 | Tee-Object -FilePath $pos
          pwsh -ExecutionPolicy Bypass -File tools/test_mtls_negative.ps1 *>&1 | Tee-Object -FilePath $neg
          echo "Saved mTLS logs: $pos, $neg"

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: cp-smoke-and-mtls-logs
          path: |
            ${{ runner.temp }}/cp_smoke.log
            ${{ runner.temp }}/mtls_positive.log
            ${{ runner.temp }}/mtls_negative.log
