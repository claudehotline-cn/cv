name: Agent Tests

on:
  push:
    branches: [ "IOBinding", "main" ]
    paths:
      - 'agent-core/**'
      - 'agent-plugins/**'
      - 'agent-test/**'
      - 'agent-cli/**'
      - 'agent-auth/**'
      - 'agent-auth-client/**'
      - 'agent-platform-api/**'
      - 'rag_service/**'
  pull_request:
    branches: [ "IOBinding", "main" ]
    paths:
      - 'agent-core/**'
      - 'agent-plugins/**'
      - 'agent-test/**'
      - 'agent-cli/**'
      - 'agent-auth/**'
      - 'agent-auth-client/**'
      - 'agent-platform-api/**'
      - 'rag_service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e agent-core
        pip install -e agent-test
        if [ -f agent-auth/requirements.txt ]; then pip install -r agent-auth/requirements.txt; fi
        # Install other requirements as needed
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-recording

    - name: Run Agent Tests
      env:
        PYTHONPATH: ${{ github.workspace }}/agent-core:${{ github.workspace }}/agent-test:${{ github.workspace }}/agent-plugins:${{ github.workspace }}/agent-auth:${{ github.workspace }}/agent-auth-client:${{ github.workspace }}
      run: |
        # Run auth provider contract tests
        pytest -q -c agent-test/pytest.ini agent-auth/app/tests/contract

        # Run auth integration e2e tests when services are available
        pytest -q -c agent-test/pytest.ini -m auth_integration agent-test/tests/integration/auth || true

        # Find all agent plugins and run their tests
        for dir in agent-plugins/*/; do
            if [ -d "$dir/tests" ]; then
                echo "Testing $dir..."
                pytest "$dir/tests"
            fi
        done
