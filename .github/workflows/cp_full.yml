name: Controlplane Full (TLS non-min)

on:
  workflow_dispatch:

jobs:
  full-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Setup vcpkg
        uses: microsoft/setup-vcpkg@v1
        with:
          vcpkgTriplet: x64-windows
          appendEnv: true

      - name: Ensure Ninja
        run: choco install ninja -y

      - name: Configure + Build VideoAnalyzer (Release)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vroot = $env:VCPKG_ROOT; if (-not $vroot) { $vroot = $env:VCPKG_INSTALLATION_ROOT }
          cmake -S video-analyzer -B video-analyzer/build-ninja -G Ninja `
            -DCMAKE_TOOLCHAIN_FILE="${vroot}/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows -DCMAKE_BUILD_TYPE=Release `
            -DVA_USE_LOCAL_YAML=ON -DVA_DISABLE_HTTP_PUBLIC=ON
          cmake --build video-analyzer/build-ninja -j 2

      - name: Configure + Build VideoSourceManager (Release)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vroot = $env:VCPKG_ROOT; if (-not $vroot) { $vroot = $env:VCPKG_INSTALLATION_ROOT }
          cmake -S video-source-manager -B video-source-manager/build -G Ninja `
            -DCMAKE_TOOLCHAIN_FILE="${vroot}/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows -DCMAKE_BUILD_TYPE=Release
          cmake --build video-source-manager/build -j 2

      - name: Run smoke (TLS, non-min)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $log = Join-Path $env:RUNNER_TEMP 'cp_smoke_full.log'
          tools/run_cp_smoke.ps1 -BaseUrl 'http://127.0.0.1:18080' -CfgDir 'controlplane/config' *>&1 | Tee-Object -FilePath $log
          echo "Saved log: $log"

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: cp-full-logs
          path: |
            ${{ runner.temp }}/cp_smoke_full.log
            logs/**

