services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "cv_cp"
      MYSQL_TCP_PORT: 3306
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "13306:3306" # 宿主端口 → 容器 3306，用于本机或外部访问
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../db/mlflow_init.sql:/docker-entrypoint-initdb.d/02-mlflow.sql:ro
      - ../../db/fixed_dump.sql:/docker-entrypoint-initdb.d/03-fixed-data.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 5s
      timeout: 3s
      retries: 20
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      POSTGRES_USER: "cv_kb"
      POSTGRES_PASSWORD: "cv_kb_pass"
      POSTGRES_DB: "cv_kb"
    ports:
      - "15432:5432" # 宿主 15432 → 容器 5432，以免与本机 Postgres 冲突
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: langgraph-redis
    ports:
      - "6379:6379"
    volumes:
      - langgraph-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web 控制台
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null || exit 1" ]
      interval: 5s
      timeout: 2s
      retries: 20

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    command: |
      set -eux;
      # wait for minio readiness (extra guard)
      for i in $(seq 1 60); do
        if wget -qO- http://minio:9000/minio/health/ready >/dev/null 2>&1; then break; fi; sleep 1; done;
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb -p local/cv-models || true;
      echo "[mc] bucket cv-models ready";

  agent-test:
    build:
      context: ../..
      dockerfile: docker/agent-test/Dockerfile
    image: cv/agent-test:latest
    container_name: agent-test
    volumes:
      - ../..:/workspace
    # Keep the container running
    command: [ "tail", "-f", "/dev/null" ]

  agent-langchain:
    # 使用 langgraph build 构建的生产镜像（支持 PostgreSQL 线程持久化）
    # 重建命令: cd agent-langchain && langgraph build -t cv/agent-langchain-prod:latest -c langgraph.json
    image: cv/agent-langchain-prod:latest
    container_name: agent-langchain
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      # LLM 配置：使用 vLLM
      - AGENT_LLM_PROVIDER=vllm
      - AGENT_OPENAI_MODEL=/data/models/Qwen3-Omni-30B-A3B-Thinking-AWQ-4bit
      - AGENT_VLLM_BASE_URL=http://vllm:8000/v1
      # 数据库配置：复用 mysql 服务
      - AGENT_DB_HOST=mysql
      - AGENT_DB_PORT=3306
      - AGENT_DB_USER=root
      - AGENT_DB_PASSWORD=123456
      - AGENT_DB_DEFAULT_NAME=cv_cp
      # SQL Agent 超时配置：允许较长时间生成复杂多表查询 SQL
      - AGENT_DB_SQL_TIMEOUT_SEC=120
      # Excel 相关配置：如需在容器内分析本地文件，可通过挂载卷调整基础目录
      - AGENT_EXCEL_FILE_BASE_DIR=/data/excel
      - AGENT_EXCEL_MAX_CHART_ROWS=500
      # PostgreSQL (长期记忆 Store)
      - POSTGRES_HOST=pgvector
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cv_kb
      - POSTGRES_PASSWORD=cv_kb_pass
      - POSTGRES_DB=cv_kb
      # LangGraph API 生产模式数据库（线程、运行持久化）
      - POSTGRES_URI=postgresql://cv_kb:cv_kb_pass@pgvector:5432/cv_kb
      # Redis (LangGraph API pub/sub)
      - REDIS_URI=redis://langgraph-redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18110:8000" # langgraph-api 生产镜像默认监听 8000
    volumes:
      # 可选：挂载 Excel 文件目录，供 Excel 图表 Agent 使用
      - ../../logs:/logs:rw
      - ../../docs:/docs:ro
      # Excel 文件基础目录（可根据实际需要调整/新增挂载）
      - ../../docs/examples:/data/excel:ro
      - ../../agent-langchain:/app/agent-langchain
      - ../../policy.yaml:/app/policy.yaml:ro
      # 工作区目录：用于持久化分析结果（DataFrame、图表、报告）
      - ../../agent-langchain/workspace:/data/workspace:rw

  # ============================================================================
  # Agent Platform API (Unified)
  # ============================================================================
  agent-api:
    build:
      context: ../../agent-platform-api
      dockerfile: Dockerfile
    image: cv/agent-platform-api:latest
    container_name: agent-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://cv_kb:cv_kb_pass@pgvector:5432/cv_kb
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/agent-audit:/app/agent-core:/app/agent-plugins:/app/app:/app
      - REDIS_URL=redis://langgraph-redis:6379
      # LLM
      - AGENT_LLM_PROVIDER=vllm
      - AGENT_VLLM_BASE_URL=http://vllm:8000/v1
      - AGENT_OPENAI_MODEL=/data/models/Qwen3-Omni-30B-A3B-Thinking-AWQ-4bit
      # MySQL (Target Data Source)
      - AGENT_DB_HOST=mysql
      - AGENT_DB_PORT=3306
      - AGENT_DB_USER=root
      - AGENT_DB_PASSWORD=123456
      - AGENT_DB_DEFAULT_NAME=cv_cp
      # Postgres (Platform Infra)
      - POSTGRES_HOST=pgvector
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cv_kb
      - POSTGRES_PASSWORD=cv_kb_pass
      - POSTGRES_DB=cv_kb
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18111:8000"
    volumes:
      - ../../logs:/logs:rw
      - ../../agent-audit:/app/agent-audit:rw
      - ../../agent-core:/app/agent-core:rw
      - ../../agent-plugins:/app/agent-plugins:rw
      - ../../agent-platform-api/app:/app/app:rw # Hot reload for API code
      # Workspaces
      - ../../agent-langchain/workspace:/data/workspace:rw
      - ../../policy.yaml:/app/policy.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-worker:
    build:
      context: ../../agent-platform-api
      dockerfile: Dockerfile
    image: cv/agent-platform-api:latest
    container_name: agent-worker
    command: [ "arq", "app.worker.WorkerSettings" ]
    environment:
      - DATABASE_URL=postgresql+asyncpg://cv_kb:cv_kb_pass@pgvector:5432/cv_kb
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/agent-audit:/app/agent-core:/app/agent-plugins:/app/app:/app
      - REDIS_URL=redis://langgraph-redis:6379
      - AGENT_LLM_PROVIDER=vllm
      - AGENT_VLLM_BASE_URL=http://vllm:8000/v1
      - POSTGRES_HOST=pgvector
      - POSTGRES_PORT=5432
      - POSTGRES_USER=cv_kb
      - POSTGRES_PASSWORD=cv_kb_pass
      - POSTGRES_DB=cv_kb
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../logs:/logs:rw
      - ../../agent-audit:/app/agent-audit:rw
      - ../../agent-core:/app/agent-core:rw
      - ../../agent-plugins:/app/agent-plugins:rw
      - ../../agent-platform-api/app:/app/app:rw # Hot reload for worker code
      - ../../agent-langchain/workspace:/data/workspace:rw
      - ../../policy.yaml:/app/policy.yaml:ro

  # ============================================================================
  # Agent Chat Vue (新 Vue 前端，连接 agent-chat-api)
  # ============================================================================
  agent-chat-vue:
    build:
      context: ../..
      dockerfile: docker/agent-chat-vue/Dockerfile
    image: cv/agent-chat-vue:latest
    container_name: agent-chat-vue
    environment:
      - VITE_API_URL=/api
      - API_PROXY_TARGET=http://agent-api:8000
      - DOCKER_ENV=true
    depends_on:
      agent-api:
        condition: service_healthy
    ports:
      - "18122:3000" # Vite dev server
    volumes:
      # 源码热重载
      - ../../agent-chat-vue/src:/app/src:ro
      # SDK
      - ../../agent-sdk:/agent-sdk:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:3000/ > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # 旧前端 (Next.js agent-chat-ui，依赖 langgraph-cli)
  # ============================================================================
  agent-chat-ui:
    build:
      # 切换构上下文为 third-party/agent-chat-ui (Next.js 版本)
      context: ../..
      dockerfile: docker/agent-chat-ui/Dockerfile
      # ✅ 关键：Next.js 需要构建时注入 NEXT_PUBLIC 变量
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_ASSISTANT_ID: data_deep_agent
    image: cv/agent-chat-ui:latest
    container_name: agent-chat-ui
    environment:
      # Runtime 变量 (Server Side)
      - NEXT_PUBLIC_API_URL=/api
      - LANGGRAPH_API_URL=http://agent-langchain:8000 # 生产镜像监听 8000
      - NEXT_PUBLIC_ASSISTANT_ID=data_deep_agent
    depends_on:
      agent-langchain:
        condition: service_started
    ports:
      - "18120:3000" # Next.js 默认端口 3000
    volumes:
      # 挂载 article-agent 导出的 Markdown/图片目录 (可选)
      # 这里暂时保留挂载，虽然纯前端静态包可能无法直接像 Next.js SSR 那样直接读文件系统，
      # 但通常是前端请求后端 API，后端返回 URL。
      # 如果 rag-ui 有 nginx 配置反代 /articles 到本地文件系统，则需要挂载到 nginx 目录。
      - ../../logs/articles:/usr/share/nginx/html/articles:ro

  article-agent:
    build:
      context: ../..
      dockerfile: docker/article-agent/Dockerfile
    image: cv/article-agent:latest
    container_name: article-agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLM 提供方：gemini | ollama | openai | siliconflow | vllm
      - ARTICLE_AGENT_LLM_PROVIDER=vllm
      - ARTICLE_AGENT_LLM_MODEL=/data/models/Qwen3-Omni-30B-A3B-Thinking-AWQ-4bit
      - ARTICLE_AGENT_VLLM_BASE_URL=http://vllm:8000/v1
      # VLM 配置
      - ARTICLE_AGENT_VLM_ENABLED=true
      - ARTICLE_AGENT_VLM_MODEL=/data/models/Qwen3-Omni-30B-A3B-Thinking-AWQ-4bit
      - ARTICLE_AGENT_VLLM_VL_BASE_URL=http://vllm:8000/v1
      # 输出目录配置
      - ARTICLE_TEMP_DIR=/data/workspace/artifacts
      - ARTICLE_AGENT_ARTICLES_BASE_DIR=/data/workspace/articles
      - ARTICLE_AGENT_ARTICLES_BASE_URL=/articles
      # LangSmith 追踪配置（用于查看 Main Agent 推理过程）
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING_V2=true
      - LANGSMITH_PROJECT=article-agent
      # 禁用代码热重载（避免任务执行中断）
      - LANGGRAPH_RELOAD=false
      # 解决 BlockingError: Blocking call to os.mkdir
      - BG_JOB_ISOLATED_LOOPS=true
    command:
      - "langgraph"
      - "dev"
      - "--config"
      - "article_agent/langgraph.json"
      - "--allow-blocking"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8130"
    depends_on:
      agent-langchain:
        condition: service_started
    ports:
      - "18130:8130"
    volumes:
      - ../../logs:/logs:rw
      - ../../docs:/docs:ro
      - ../../article_agent/workspace:/data/workspace:rw
      - ../../article_agent:/app/article_agent:rw
      - ../../policy.yaml:/app/policy.yaml:ro
      # Persist HuggingFace model cache (Docling models)
      - ../../.hf_cache:/root/.cache/huggingface:rw
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8130/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474" # HTTP Console
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-service:
    build:
      context: ../..
      dockerfile: docker/rag-service/Dockerfile
    image: cv/rag-service:latest
    container_name: rag-service
    environment:
      - RAG_MYSQL_HOST=mysql
      - RAG_PGVECTOR_HOST=pgvector
      - RAG_MINIO_ENDPOINT=minio:9000
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "18200:8200"
    volumes:
      - ../../rag_service/rag_service:/app/rag_service
      - ../../logs:/logs:rw
      - rag-model-cache:/root/.cache/huggingface
      - ../../article_agent/workspace/artifacts:/data/workspace/artifacts:ro

  rag-ui:
    image: node:20-slim
    container_name: rag-ui
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      - VITE_API_URL=/api
    volumes:
      - ../../rag-ui:/app
      - rag-ui-node-modules:/app/node_modules
    depends_on:
      - rag-service
      - article-agent
    ports:
      - "18210:80"

  # ============================================================================
  # vLLM 推理服务 (OpenAI 兼容 API)
  # ============================================================================
  vllm:
    build:
      context: ../vllm
      dockerfile: Dockerfile.vllm-omni
    image: vllm-omni:v0.13.0-sm120
    container_name: vllm
    ports:
      - "18000:8000"
    volumes:
      - ../../models:/data/models:rw
      - ../vllm/entrypoint.py:/app/entrypoint.py
    environment:
      - VLLM_USE_MODELSCOPE=false
      - VLLM_ATTENTION_BACKEND=FLASHINFER
    ipc: host
    command:
      - "--model"
      - "/data/models/Qwen3-Omni-30B-A3B-Thinking-AWQ-4bit"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "65536"
      - "--gpu-memory-utilization"
      - "0.80"
      - "--max-num-seqs"
      - "16"
      - "--kv-cache-dtype"
      - "fp8"
      - "--trust-remote-code"
      - "--enable-chunked-prefill"
      - "--enable-prefix-caching"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      # - "--reasoning-parser"
      # - "qwen3"
      - "--swap-space"
      - "16"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    profiles:
      - vllm

networks:
  default:
    name: cv-net

volumes:
  minio-data:
  mysql-data:
  mlflow-artifacts:
  pgvector-data:
  agent-checkpoints:
  neo4j-data:
  rag-model-cache:
  ollama-vl-data:
  rag-ui-node-modules:
  langgraph-redis-data:
