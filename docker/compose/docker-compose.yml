services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "cv_cp"
      MYSQL_TCP_PORT: 3306
    ports:
      - "13306:3306"   # 宿主端口 → 容器 3306，用于本机或外部访问
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh","-c"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    command: |
      set -eux;
      # wait for minio readiness (extra guard)
      for i in $(seq 1 60); do
        if wget -qO- http://minio:9000/minio/health/ready >/dev/null 2>&1; then break; fi; sleep 1; done;
      mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD";
      mc mb -p local/cv-models || true;
      echo "[mc] bucket cv-models ready";

  va:
    build:
      context: ../..
      dockerfile: docker/va/Dockerfile.cpu
    image: cv/va:latest-cpu
    container_name: va
    ports:
      - "8082:8082"
      - "9090:9090"
      - "50051:50051"
      - "10000-10100:10000-10100/udp"
    # 为 CUDA IPC 共享内存（Triton CUDA SHM）开启共享 IPC 命名空间（GPU 覆盖已包含，此处在基础 compose 同步）
    ipc: host
    environment:
      - VA_PROM_ENDPOINT=0.0.0.0:9090
      - VA_ICE_PORT_RANGE=10000-10100
      - VA_ICE_TCP=1
      - VA_STUN=stun.l.google.com:19302
      # S3 (MinIO) for Triton model repository
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_EC2_METADATA_DISABLED=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_S3_ENDPOINT=http://minio:9000
      # Some builds prefer S3_ prefix (Triton runtime);提供两套以最大兼容
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin123
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
      - S3_USE_HTTPS=0
      - S3_VERIFY_SSL=0
      - S3_ADDRESSING_STYLE=path
      - S3_FORCE_PATH_STYLE=1
      - AWS_S3_FORCE_PATH_STYLE=true
      # Speed up native TensorRT engine build (tensorrt-native)
      - VA_TRT_TACTIC_SOURCES=cublaslt,cublas,cudnn
      - VA_TRT_BUILDER_OPT=1
      - VA_TRT_MIN_TIMING=1
      - VA_TRT_AVG_TIMING=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../config/va:/app/config:ro
      # 模型目录仅映射为相对路径可用的 /app/models（YAML 写 models/xxx.onnx）
      - ../model:/app/models:ro
      - ../../video-analyzer/config/certs:/app/config/certs:ro
      - ../../logs:/logs:rw
      # 持久化原生 TensorRT timing/engine 缓存，缩短冷启动时长
      - ../../.trt_native_cache:/app/.trt_native_cache:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/metrics >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      minio:
        condition: service_healthy
      minio-mc:
        condition: service_started

  cp:
    build:
      context: ../..
      dockerfile: docker/cp/Dockerfile
    image: cv/cp:latest
    container_name: cp
    environment:
      - VA_REST_BASE=va:8082
    depends_on:
      mysql:
        condition: service_healthy
      va:
        condition: service_healthy
      vsm:
        condition: service_healthy
    ports:
      - "18080:18080"
    volumes:
      - ../config/cp:/app/config:ro
      - ../../controlplane/config/certs:/app/config/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/api/system/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
    image: cv/web:latest
    container_name: web
    depends_on:
      cp:
        condition: service_healthy
    ports:
      - "8080:8080"

  vsm:
    build:
      context: ../..
      dockerfile: docker/vsm/Dockerfile
    image: cv/vsm:latest
    container_name: vsm
    ports:
      - "7070:7070"   # gRPC 端口暴露
      - "7071:7071"   # HTTP 端口暴露
    volumes:
      - ../../video-source-manager/config:/app/config:ro
    healthcheck:
      test: ["CMD","bash","-c","(curl -sf http://localhost:7071/health || true) && echo ok"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  default:
    name: cv-net

volumes:
  minio-data:
  mysql-data:
