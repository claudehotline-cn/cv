services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "cv_cp"
      MYSQL_TCP_PORT: 3306
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "13306:3306"   # 宿主端口 → 容器 3306，用于本机或外部访问
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../db/mlflow_init.sql:/docker-entrypoint-initdb.d/02-mlflow.sql:ro
      - ../../db/fixed_dump.sql:/docker-entrypoint-initdb.d/03-fixed-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      POSTGRES_USER: "cv_kb"
      POSTGRES_PASSWORD: "cv_kb_pass"
      POSTGRES_DB: "cv_kb"
    ports:
      - "15432:5432"   # 宿主 15432 → 容器 5432，以免与本机 Postgres 冲突
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh","-c"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin123"
    command: |
      set -eux;
      # wait for minio readiness (extra guard)
      for i in $(seq 1 60); do
        if wget -qO- http://minio:9000/minio/health/ready >/dev/null 2>&1; then break; fi; sleep 1; done;
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb -p local/cv-models || true;
      echo "[mc] bucket cv-models ready";

  va:
    build:
      context: ../..
      dockerfile: docker/va/Dockerfile.cpu
    image: cv/va:latest-cpu
    container_name: va
    ports:
      - "8082:8082"
      - "9090:9090"
      - "50051:50051"
      - "10000-10100:10000-10100/udp"
    # 为 CUDA IPC 共享内存（Triton CUDA SHM）开启共享 IPC 命名空间（GPU 覆盖已包含，此处在基础 compose 同步）
    ipc: host
    environment:
      - VA_PROM_ENDPOINT=0.0.0.0:9090
      - VA_ICE_PORT_RANGE=10000-10100
      - VA_ICE_TCP=1
      - VA_STUN=stun.l.google.com:19302
      # S3 (MinIO) for Triton model repository
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_EC2_METADATA_DISABLED=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_S3_ENDPOINT=http://minio:9000
      # Some builds prefer S3_ prefix (Triton runtime);提供两套以最大兼容
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin123
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
      - S3_USE_HTTPS=0
      - S3_VERIFY_SSL=0
      - S3_ADDRESSING_STYLE=path
      - S3_FORCE_PATH_STYLE=1
      - AWS_S3_FORCE_PATH_STYLE=true
      # Speed up native TensorRT engine build (tensorrt-native)
      - VA_TRT_TACTIC_SOURCES=cublaslt,cublas,cudnn
      - VA_TRT_BUILDER_OPT=1
      - VA_TRT_MIN_TIMING=1
      - VA_TRT_AVG_TIMING=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../config/va:/app/config:ro
      # 模型目录仅映射为相对路径可用的 /app/models（YAML 写 models/xxx.onnx）
      - ../model:/app/models:ro
      - ../../video-analyzer/config/certs:/app/config/certs:ro
      - ../../logs:/logs:rw
      # 持久化原生 TensorRT timing/engine 缓存，缩短冷启动时长
      - ../../.trt_native_cache:/app/.trt_native_cache:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/metrics >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      minio:
        condition: service_healthy
      minio-mc:
        condition: service_started

  cp:
    build:
      context: ../..
      dockerfile: docker/cp/Dockerfile
    image: cv/cp:latest
    container_name: cp
    environment:
      - VA_REST_BASE=va:8082
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_S3_ENDPOINT=http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      va:
        condition: service_healthy
      vsm:
        condition: service_healthy
      trainer:
        condition: service_healthy
    # 不再暴露到宿主机端口，避免与 cp-spring 冲突；仍可在 compose 网络内被访问
    volumes:
      - ../config/cp:/app/config:ro
      - ../../controlplane/config/certs:/app/config/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/api/system/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  cp-spring:
    build:
      context: ../..
      dockerfile: docker/cp-spring/Dockerfile
    image: cv/cp-spring:latest
    container_name: cp-spring
    environment:
      # 覆盖 Spring Boot 配置，使其在 compose 网络中访问下游
      - CP_VA_GRPC_ADDR=va:50051
      - CP_VSM_GRPC_ADDR=vsm:7070
      - CP_DB_HOST=mysql
      - CP_DB_PORT=3306
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cv_cp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
    depends_on:
      mysql:
        condition: service_healthy
      va:
        condition: service_healthy
      vsm:
        condition: service_healthy
    ports:
      - "18080:18080"
    volumes:
      # 挂载 Maven 依赖仓库到项目根目录下的 .repository，方便持久化与调试
      - /home/chaisen/projects/cv/.repository:/root/.m2/repository
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/api/system/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
    image: cv/web:latest
    container_name: web
    depends_on:
      cp-spring:
        condition: service_healthy
    ports:
      - "8080:8080"

  vsm:
    build:
      context: ../..
      dockerfile: docker/vsm/Dockerfile
    image: cv/vsm:latest
    container_name: vsm
    ports:
      - "7070:7070"   # gRPC 端口暴露
      - "7071:7071"   # HTTP 端口暴露
    volumes:
      - ../../video-source-manager/config:/app/config:ro
    healthcheck:
      test: ["CMD","bash","-c","(curl -sf http://localhost:7071/health || true) && echo ok"]
      interval: 10s
      timeout: 3s
      retries: 5

  mlflow:
    build:
      context: ../..
      dockerfile: docker/mlflow/Dockerfile
    image: cv/mlflow:latest
    container_name: mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=mysql+pymysql://root:123456@mysql:3306/mlflow
      - MLFLOW_ARTIFACT_ROOT=s3://cv-models/mlruns
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_S3_ENDPOINT=http://minio:9000
    command: /bin/sh -c "mlflow server --backend-store-uri $$MLFLOW_BACKEND_STORE_URI --default-artifact-root $$MLFLOW_ARTIFACT_ROOT --host 0.0.0.0 --port 5500"
    ports:
      - "5500:5500"
    volumes:
      - mlflow-artifacts:/mlruns
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:5500/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # mysql-init-mlflow one-shot initializer removed; use manual init when needed

  trainer:
    build:
      context: ../..
      dockerfile: docker/trainer-service/Dockerfile
    image: cv/trainer-service:latest
    container_name: trainer
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5500
      # S3 (MinIO) for optional artifact upload
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_EC2_METADATA_DISABLED=true
      - S3_ADDRESSING_STYLE=path
      - TRAINER_S3_BUCKET=cv-models
      - TRAINER_S3_PREFIX=trainer
    volumes:
      - ../../docker/model:/models:ro
    ports:
      - "8088:8088"
    depends_on:
      mlflow:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # 使用 Python 内置库进行 HTTP 探针，避免对 wget/curl 依赖
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/api/train/list', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: ../..
      dockerfile: docker/agent/Dockerfile
    image: cv/agent:latest
    container_name: agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AGENT_CP_BASE_URL=http://cp-spring:18080
      - AGENT_OPENAI_MODEL=qwen3:30b
      - AGENT_LLM_PROVIDER=ollama
      - AGENT_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HF_ENDPOINT=https://hf-mirror.com
      - AGENT_LOG_LEVEL=INFO
      # SQL Agent：允许更长时间生成复杂多表查询 SQL，单位秒
      - AGENT_DB_SQL_TIMEOUT_SEC=120
      # 默认：使用 SQLite 作为 LangGraph checkpoint 后端，并将文件写入持久化卷。
      # 如需在多实例部署中共享线程状态，可切换为 MySQL：
      #   AGENT_CHECKPOINT_BACKEND=mysql
      #   AGENT_CHECKPOINT_MYSQL_DSN=mysql+pymysql://root:123456@mysql:3306/cv_cp
      - AGENT_CHECKPOINT_BACKEND=sqlite
      - AGENT_CHECKPOINT_SQLITE_CONN=/data/checkpoints/checkpoints.sqlite
      # RAG 向量检索：使用 Ollama 作为 embedding 提供方
      - AGENT_RAG_EMBEDDING_PROVIDER=ollama
      - AGENT_RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - AGENT_RAG_OLLAMA_MODEL=bge-m3:567m
    depends_on:
      cp-spring:
        condition: service_healthy
    ports:
      - "18081:8000"
    volumes:
      # LangGraph SQLite checkpoint 持久化卷
      - agent-checkpoints:/data/checkpoints
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  agent-langchain:
    build:
      context: ../..
      dockerfile: docker/agent-langchain/Dockerfile
    image: cv/agent-langchain:latest
    container_name: agent-langchain
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # LLM 配置，与 agent 服务保持一致（默认通过 Ollama 调 qwen3:14b）
      - AGENT_LLM_PROVIDER=ollama
      - AGENT_OPENAI_MODEL=qwen3:30b
      - AGENT_OLLAMA_BASE_URL=http://host.docker.internal:11434
      # 数据库配置：复用 mysql 服务
      - AGENT_DB_HOST=mysql
      - AGENT_DB_PORT=3306
      - AGENT_DB_USER=root
      - AGENT_DB_PASSWORD=123456
      - AGENT_DB_DEFAULT_NAME=cv_cp
      # SQL Agent 超时配置：允许较长时间生成复杂多表查询 SQL
      - AGENT_DB_SQL_TIMEOUT_SEC=120
      # Excel 相关配置：如需在容器内分析本地文件，可通过挂载卷调整基础目录
      - AGENT_EXCEL_FILE_BASE_DIR=/data/excel
      - AGENT_EXCEL_MAX_CHART_ROWS=500
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "18110:8100"
    volumes:
      # 可选：挂载 Excel 文件目录，供 Excel 图表 Agent 使用
      - ../../logs:/logs:rw
      - ../../docs:/docs:ro
      # Excel 文件基础目录（可根据实际需要调整/新增挂载）
      - ../../docs/examples:/data/excel:ro
      - ../../agent-langchain:/app/agent-langchain

  agent-chat-ui:
    build:
      context: ../../rag-ui
      dockerfile: Dockerfile
    image: cv/agent-chat-ui:latest
    container_name: agent-chat-ui
    depends_on:
      agent-langchain:
        condition: service_started
    ports:
      - "18120:80"
    volumes:
      # 挂载 article-agent 导出的 Markdown/图片目录，供下载路由使用 (注意：Nginx 静态服务需要配置，或者前端通过 API 获取)
      # 这里暂时保留挂载，虽然纯前端静态包可能无法直接像 Next.js SSR 那样直接读文件系统，
      # 但通常是前端请求后端 API，后端返回 URL。
      # 如果 rag-ui 有 nginx 配置反代 /articles 到本地文件系统，则需要挂载到 nginx 目录。
      - ../../logs/articles:/usr/share/nginx/html/articles:ro

  article-agent:
    build:
      context: ../..
      dockerfile: docker/article-agent/Dockerfile
    image: cv/article-agent:latest
    container_name: article-agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLM 提供方：gemini | ollama | openai | siliconflow | vllm
      - ARTICLE_AGENT_LLM_PROVIDER=vllm
      - ARTICLE_AGENT_LLM_MODEL=/data/models/qwen3-vl-8b-instruct-awq
      - ARTICLE_AGENT_VLLM_BASE_URL=http://vllm:8000/v1
      # VLM 配置
      - ARTICLE_AGENT_VLM_ENABLED=true
      - ARTICLE_AGENT_VLM_MODEL=/data/models/qwen3-vl-8b-instruct-awq
      - ARTICLE_AGENT_VLLM_VL_BASE_URL=http://vllm:8000/v1
      # 输出目录配置
      - ARTICLE_TEMP_DIR=/data/workspace/artifacts
      - ARTICLE_AGENT_ARTICLES_BASE_DIR=/data/workspace/articles
      - ARTICLE_AGENT_ARTICLES_BASE_URL=/articles
      # LangSmith 追踪配置（用于查看 Main Agent 推理过程）
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING_V2=true
      - LANGSMITH_PROJECT=article-agent
      # 禁用代码热重载（避免任务执行中断）
      - LANGGRAPH_RELOAD=false
      # 解决 BlockingError: Blocking call to os.mkdir
      - BG_JOB_ISOLATED_LOOPS=true
    depends_on:
      agent-langchain:
        condition: service_started
    ports:
      - "18130:8130"
    volumes:
      - ../../logs:/logs:rw
      - ../../docs:/docs:ro
      - ../../article_agent/workspace:/data/workspace:rw
      - ../../article_agent:/app/article_agent:rw
      # Persist HuggingFace model cache (Docling models)
      - ../../.hf_cache:/root/.cache/huggingface:rw
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8130/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474" # HTTP Console
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-service:
    build:
      context: ../..
      dockerfile: docker/rag-service/Dockerfile
    image: cv/rag-service:latest
    container_name: rag-service
    environment:
      - RAG_MYSQL_HOST=mysql
      - RAG_PGVECTOR_HOST=pgvector
      - RAG_MINIO_ENDPOINT=minio:9000
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "18200:8200"
    volumes:
      - ../../rag_service/rag_service:/app/rag_service
      - ../../logs:/logs:rw
      - rag-model-cache:/root/.cache/huggingface
      - ../../article_agent/workspace/artifacts:/data/workspace/artifacts:ro

  rag-ui:
    build:
      context: ../..
      dockerfile: docker/rag-ui/Dockerfile
    image: cv/rag-ui:latest
    container_name: rag-ui
    environment:
      - VITE_API_URL=/api
    volumes:
      - ../../docker/rag-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rag-service
      - article-agent
    ports:
      - "18210:80"

  # ============================================================================
  # vLLM 推理服务 (OpenAI 兼容 API)
  # ============================================================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "18000:8000"
    volumes:
      - ../../models:/data/models:ro
    environment:
      - VLLM_USE_MODELSCOPE=true
    ipc: host
    command:
      - "--model"
      - "/data/models/qwen3-vl-8b-instruct-awq"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.80"
      - "--max-num-seqs"
      - "16"
      - "--max-num-batched-tokens"
      - "8192"
      - "--kv-cache-dtype"
      - "fp8"
      - "--trust-remote-code"
      - "--limit-mm-per-prompt"
      - "{\"image\": 4}"
      - "--enable-prefix-caching"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    profiles:
      - vllm

networks:
  default:
    name: cv-net

volumes:
  minio-data:
  mysql-data:
  mlflow-artifacts:
  pgvector-data:
  agent-checkpoints:
  neo4j-data:
  rag-model-cache:
  ollama-vl-data:
