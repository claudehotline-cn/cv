services:
  va:
    build:
      dockerfile: docker/va/Dockerfile.gpu
      args:
        ORT_VERSION: "1.23.2"
        ORT_REBUILD: "0"                # 默认不重建 ORT（需要时可临时改为 1）
        ORT_BUILD_TAG: "ort-1.23.2-cuda13-sm120-trt"
        UBUNTU_VER: "22.04"                    # 与 NGC 镜像 ubuntu 版本一致
        NGC_TRT_TAG: "${NGC_TRT_TAG}"         # 由环境变量指定，需对应 CUDA 13.0 的标签
        EXPECTED_CUDA_MAJOR: "13"               # 严格版本校验：CUDA 主版本（13）
        EXPECTED_CUDA_MINOR: "0"                # 严格版本校验：CUDA 次版本（13.0 -> 0）
        EXPECTED_CUDNN_MAJOR: "9"               # 严格版本校验：cuDNN 主版本
        STRICT_VERSION: "ON"                    # 不匹配直接失败
        STRICT_TRT: "ON"                        # 缺少 TRT 头/库直接失败
        STRICT_CUDA_MINOR: "OFF"                 # 开启次版本严格校验（要求 13.0）
    image: cv/va:latest-gpu
    # Docker Compose v2 建议方式：明确声明使用全部 GPU 设备
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      # ORT 日志等级：2=WARNING，仅警告及以上
      - ORT_LOG_SEVERITY_LEVEL=2
      # Speed up native TensorRT engine build (tensorrt-native)
      - VA_TRT_TACTIC_SOURCES=cublaslt,cublas,cudnn
      - VA_TRT_BUILDER_OPT=1
      - VA_TRT_MIN_TIMING=1
      - VA_TRT_AVG_TIMING=1
    volumes:
      # 持久化 ORT TensorRT 引擎与 timing 缓存，避免重启后重建
      - ../../.ort_trt_cache:/app/.ort_trt_cache
      # 持久化原生 TensorRT (tensorrt-native) timing/engine 缓存
      - ../../.trt_native_cache:/app/.trt_native_cache
