services:
  va:
    build:
      dockerfile: docker/va/Dockerfile.gpu
      args:
        ORT_VERSION: "1.23.2"
        ORT_REBUILD: "0"                # 默认不重建 ORT（需要时可临时改为 1）
        ORT_BUILD_TAG: "ort-1.23.2-cuda13-sm120-trt"
        UBUNTU_VER: "22.04"                    # 与 NGC 镜像 ubuntu 版本一致
        # TensorRT 基础镜像（与 25.08 对齐）
        NGC_TRT_TAG: "${NGC_TRT_TAG:-25.08-py3}"
        # Triton Runtime & Client SDK tag（25.08，对齐 CUDA13 按你环境）
        TRITON_TAG: "${TRITON_TAG:-25.08-py3}"
        TRITON_CLIENT_TAG: "${TRITON_CLIENT_TAG:-25.08-py3-sdk}"
        EXPECTED_CUDA_MAJOR: "13"               # 对齐 CUDA 13.0
        EXPECTED_CUDA_MINOR: "0"
        EXPECTED_CUDNN_MAJOR: "9"               # 严格版本校验：cuDNN 主版本
        STRICT_VERSION: "ON"                    # 不匹配直接失败
        STRICT_TRT: "ON"                        # 缺少 TRT 头/库直接失败
        STRICT_CUDA_MINOR: "OFF"                 # 如需锁死 13.0，可临时改为 ON
        # 启用 In-Process Triton（libtritonserver）构建
        VA_USE_TRT_INPROC: "ON"
    image: cv/va:latest-gpu
    # Docker Compose 要求：此处使用 all，由 NVIDIA_VISIBLE_DEVICES 控制暴露设备（UUID）
    gpus: all
    # 为 CUDA IPC 共享内存（Triton CUDA SHM）开启共享 IPC 命名空间
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-699cd883-5517-6d7d-9dfd-db488fe13ec5
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - CUDA_VISIBLE_DEVICES=0
      # In-Process 模式：不启动外部 tritonserver 子进程
      - VA_TRITON_EXTERNAL=0
      # S3 (MinIO) for Triton model repository
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_EC2_METADATA_DISABLED=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin123
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
      - S3_USE_HTTPS=0
      - S3_VERIFY_SSL=0
      - S3_ADDRESSING_STYLE=path
      # ORT 日志等级：2=WARNING，仅警告及以上
      - ORT_LOG_SEVERITY_LEVEL=2
      # Speed up native TensorRT engine build (tensorrt-native)
      - VA_TRT_TACTIC_SOURCES=cublaslt,cublas,cudnn
      - VA_TRT_BUILDER_OPT=1
      - VA_TRT_MIN_TIMING=1
      - VA_TRT_AVG_TIMING=1
    volumes:
      # 持久化 ORT TensorRT 引擎与 timing 缓存，避免重启后重建
      - ../../.ort_trt_cache:/app/.ort_trt_cache
      # 持久化原生 TensorRT (tensorrt-native) timing/engine 缓存
      - ../../.trt_native_cache:/app/.trt_native_cache
      # 使用 S3 仓库后，本地 /models 映射可选（保留为空以避免混淆）
    ports:
      - "8001:8001"   # Triton gRPC
      - "8000:8000"   # Triton HTTP
  # triton 服务已并入 va 容器，由 va 的 entrypoint.sh 启动
