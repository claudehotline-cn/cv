services:
  va:
    build:
      dockerfile: docker/va/Dockerfile.gpu
      args:
        ORT_VERSION: "1.23.2"
        ORT_REBUILD: "0"                # 默认不重建 ORT（需要时可临时改为 1）
        ORT_BUILD_TAG: "ort-1.23.2-cuda13-sm120-trt"
        UBUNTU_VER: "22.04"                    # 与 NGC 镜像 ubuntu 版本一致
        NGC_TRT_TAG: "${NGC_TRT_TAG:-25.08-py3}"         # 未显式提供时使用默认 25.08-py3
        EXPECTED_CUDA_MAJOR: "13"               # 严格版本校验：CUDA 主版本（13）
        EXPECTED_CUDA_MINOR: "0"                # 严格版本校验：CUDA 次版本（13.0 -> 0）
        EXPECTED_CUDNN_MAJOR: "9"               # 严格版本校验：cuDNN 主版本
        STRICT_VERSION: "ON"                    # 不匹配直接失败
        STRICT_TRT: "ON"                        # 缺少 TRT 头/库直接失败
        STRICT_CUDA_MINOR: "OFF"                 # 开启次版本严格校验（要求 13.0）
    image: cv/va:latest-gpu
    # Docker Compose 要求：此处使用 all，由 NVIDIA_VISIBLE_DEVICES 控制暴露设备（UUID）
    gpus: all
    # 为 CUDA IPC 共享内存（Triton CUDA SHM）开启共享 IPC 命名空间
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-699cd883-5517-6d7d-9dfd-db488fe13ec5
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - CUDA_VISIBLE_DEVICES=0
      # ORT 日志等级：2=WARNING，仅警告及以上
      - ORT_LOG_SEVERITY_LEVEL=2
      # Speed up native TensorRT engine build (tensorrt-native)
      - VA_TRT_TACTIC_SOURCES=cublaslt,cublas,cudnn
      - VA_TRT_BUILDER_OPT=1
      - VA_TRT_MIN_TIMING=1
      - VA_TRT_AVG_TIMING=1
    volumes:
      # 持久化 ORT TensorRT 引擎与 timing 缓存，避免重启后重建
      - ../../.ort_trt_cache:/app/.ort_trt_cache
      # 持久化原生 TensorRT (tensorrt-native) timing/engine 缓存
      - ../../.trt_native_cache:/app/.trt_native_cache
  triton:
    image: nvcr.io/nvidia/tritonserver:25.08-py3
    # 同上：服务端通过 UUID 约束，保持 ordinal=0 一致
    gpus: all
    # 为 CUDA IPC 共享内存开启共享 IPC 命名空间（与 VA 同一 IPC NS）
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-699cd883-5517-6d7d-9dfd-db488fe13ec5
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - CUDA_VISIBLE_DEVICES=0
    command: ["tritonserver", "--model-repository=/models", "--grpc-port=8001", "--http-port=8000"]
    volumes:
      - ../../docker/model:/models:ro
    ports:
      - "8001:8001"
      - "8000:8000"
