global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: controlplane
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:18080"]
        labels:
          service: controlplane

  # Prefer VA 独立 Prom endpoint（9090）；如未启用可改回 http job
  # PROM disabled (VA 9090 not enabled)
  #\n  #     # - job_name: video-analyzer-http
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['host.docker.internal:8082']
  #       labels:
  #         service: video-analyzer

  - job_name: video-analyzer-prom
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9090']
        labels:
          service: video-analyzer
