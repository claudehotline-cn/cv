apiVersion: 1
providers:
  - name: 'cv-project-dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      recursive: true
      foldersFromFilesStructure: true
