analyzer:
  multistage:
    nodes:
      - name: pre
        type: preproc.letterbox
        params: { out_w: "640", out_h: "640", use_cuda: "1" }
      - name: det
        type: model
        params:
          in: "tensor:det_input"
          outs: "tensor:det_raw"
          # YOLOv12x 模型在 Triton config 中输入名为 images
          triton_input: "images"
          # 固定 Triton 输出名，避免动态输出路径触发 In-Process + TensorRT bug
          triton_outputs: "output0"
          # 检测：In-Process Triton 路径使用 yolov12x 仓库模型，ORT 路径用于回退
          model_path_triton: "yolov12x"
          model_path_ort: "models/yolox.onnx"
          model_path: "models/yolox.onnx"
      - name: nms
        type: post.yolo.nms
        # 目标追踪场景下的检测阈值，可按需要再调参
        params: { conf: "0.30", iou: "0.70", use_cuda: "1", emit_gpu_rois: "1" }
      - name: roi
        type: roi.batch.cuda
        params:
          in_rois: "det"
          out: "tensor:roi_batch"
          # PASS-ReID 模型配置中 INPUT.SIZE_TEST = [384, 128]
          out_w: "128"
          out_h: "384"
          max_rois: "128"
      - name: reid
        type: model
        params:
          in: "tensor:roi_batch"
          outs: "tensor:reid"
          # ReID：使用 In-Process Triton（reid_passvitb 仓库模型），并固定输出名为 feat
          model_path_triton: "reid_passvitb"
          model_path_ort: "models/reid_passvitb.onnx"
          model_path: "models/reid_passvitb.onnx"
          # PASS-ReID 模型在 ONNX/Triton config 中输入名为 input
          triton_input: "input"
          triton_outputs: "feat"
          # 仅启用 GPU 输出，输入走 CPU staging，避免 In-Process Triton 对 GPU 输入执行不兼容的 CUDA 拷贝
          # triton_gpu_input: "1"
          # triton_gpu_output: "1"
      - name: track
        type: track.ocsort
        params:
          in_rois: "det"
          out_rois: "track"
          feat_key: "tensor:reid"
          # 是否启用 GPU 追踪分支（1=启用，0=禁用，默认启用）
          use_gpu: "1"
          # Kalman + IoU 相关
          iou_thresh: "0.30"
          max_missed: "30"
          delta_t: "3"
          # ReID 特征平滑
          feat_alpha: "0.90"
          # 运动 vs 外观权重
          w_iou: "0.5"
          w_reid: "0.5"
          w_assoc_emb: "0.75"
          # 轨迹输出门槛
          min_hits: "3"
          # BYTE 二阶段低分框匹配
          use_byte: "1"
          # 自适应外观权重
          alpha_fixed_emb: "0.95"
          aw_param: "0.5"
          embedding_off: "0"
          aw_off: "0"
          # CMC（相机运动补偿），当前实现仅支持 sparse 光流模式
          cmc_method: "sparse"
          cmc_min_features: "10"
      - name: ovl
        type: overlay.cuda
        params:
          alpha: "0.2"
          thickness: "3"
          rois: "track"
          use_gpu_rois: "1"
    edges:
      - [pre, det]
      - [det, nms]
      - [nms, roi]
      - [roi, reid]
      - [nms, track]
      - [reid, track]
      - [track, ovl]
