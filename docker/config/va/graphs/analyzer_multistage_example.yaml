analyzer:
  multistage:
    nodes:
      - name: pre
        type: preproc.letterbox
        params: { out_w: "640", out_h: "640", use_cuda: "1" }
      - name: det
        type: model
        params:
          in: "tensor:det_input"
          outs: "tensor:det_raw"
          model_path_trt: "models/yolov12x_sm120_fp16.engine"
          model_path_ort: "models/yolov12x.onnx"
          # Triton 仓库模型目录名（与 triton_repo 组合使用）
          model_path_triton: "yolov12x"
          model_path: "models/yolov12x_sm120_fp16.engine"
      - name: nms
        type: post.yolo.nms
        # GPU NMS；按需求保持 0.65 置信度
        params: { conf: "0.45", iou: "0.55", use_cuda: "1" }
      - name: ovl
        type: overlay.cuda
        params: { alpha: "0.2", thickness: "3" }
    edges:
      - [pre, det]
      - [det, nms]
      - [nms, ovl]
