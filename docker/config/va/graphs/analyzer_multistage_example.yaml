analyzer:
  multistage:
    nodes:
      - name: pre
        type: preproc.letterbox
        params: { out_w: "640", out_h: "640", use_cuda: "1" }
      - name: det
        type: model.ort
        # 先用较小模型验证链路（确保该文件存在于 /app/models）
        params: { in: "tensor:det_input", outs: "tensor:det_raw", model_path: "models/yolov12x.onnx" }
      - name: nms
        type: post.yolo.nms
        # GPU NMS；按需求保持 0.65 置信度
        params: { conf: "0.65", iou: "0.45", use_cuda: "1" }
      - name: ovl
        type: overlay.cuda
        params: { alpha: "0.2", thickness: "3" }
    edges:
      - [pre, det]
      - [det, nms]
      - [nms, ovl]
