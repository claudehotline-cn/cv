groups:
  - name: controlplane.rules
    interval: 30s
    rules:
      - alert: CPHigh5xxRatio
        expr: (sum(increase(cp_request_total{code=~"5.."}[5m])))/(sum(increase(cp_request_total[5m]))+1e-9) > 0.01
        for: 5m
        labels:
          severity: warning
          service: controlplane
        annotations:
          summary: "Controlplane 5xx ratio exceeds 1%"
          description: "5xx ratio {{ $value | printf "%.2f" }} > 1% over 5m"

      - alert: CPSseConnectionsZero
        expr: cp_sse_connections < 1
        for: 10m
        labels:
          severity: warning
          service: controlplane
        annotations:
          summary: "SSE connections remain zero"
          description: "cp_sse_connections has been 0 for 10 minutes"

