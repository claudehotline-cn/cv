groups:
  - name: va-subscriptions
    rules:
      - alert: VAHighFailureRate
        expr: sum(rate(va_subscriptions_total{status="failed"}[5m])) / clamp_min(sum(rate(va_subscriptions_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VA 订阅失败率过高 (>5%)"
          description: "失败率={{ $value | printf "%.2f" }} 超过阈值"

      - alert: VAP95LatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(va_subscription_duration_seconds_bucket[5m]))) > 8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "VA 订阅 P95 时延高 (>8s)"
          description: "当前 P95={{ $value | printf "%.2f" }}s"

      - alert: VASubscriptionBacklog
        expr: va_subscriptions_inflight > 50
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "VA 订阅在途过多 (>50)"
          description: "请检查限流/排队策略与资源分配"

