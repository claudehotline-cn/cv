server:
  http_listen: 127.0.0.1:18080
va:
  grpc_addr: 127.0.0.1:50051
  timeout_ms: 30000
  retries: 0
  tls:
    enabled: true
    root_cert_file: certs/ca.pem
    client_cert_file: certs/cp_client.crt
    client_key_file: certs/cp_client.key
vsm:
  grpc_addr: 127.0.0.1:7070
  retries: 1
  tls:
    enabled: true
    root_cert_file: certs/ca.pem
    client_cert_file: certs/cp_client.crt
    client_key_file: certs/cp_client.key
restream:
  rtsp_base: rtsp://127.0.0.1:8554/
## 可选：SSE 配置
# sse:
#   keepalive_ms: 10000
#   idle_close_ms: 300000
#   sources:
#     interval_ms: 1000
security:
  cors:
    allowed_origins: ["*"]
  auth:
    bearer_token: ""
  rate_limit:
    rps: 0


# DB classic (MySQL Connector/C++)
db:
  driver: mysql
  host: 127.0.0.1
  port: 13306
  user: root
  password: 123456
  schema: cv_cp
  timeout_ms: 1000
  # odbc_driver: 'MySQL ODBC 8.4 Unicode Driver'  # 可选：若启用 ODBC 路径可显式指定

