server:
  http_listen: 0.0.0.0:8080
va:
  grpc_addr: 127.0.0.1:50051
  timeout_ms: 8000
  retries: 1
vsm:
  grpc_addr: 127.0.0.1:7070
  timeout_ms: 8000
restream:
  rtsp_base: rtsp://127.0.0.1:8554/
observability:
  metrics_registry_enabled: true

# 安全基线（默认关闭；按需开启）
# security:
#   cors:
#     allowed_origins: ["*"]           # 或 ["http://127.0.0.1:3000"]
#   auth:
#     bearer_token: ""                 # 令牌非空时开启校验（/metrics 豁免）
#   rate_limit:
#     rps: 0                           # 每路由每秒请求上限；0 表示关闭
