server:
  http_listen: 127.0.0.1:18080
va:
  grpc_addr: 127.0.0.1:55051
  tls:
    enabled: true
    root_cert_file: controlplane/config/certs/ca.pem
    client_cert_file: controlplane/config/certs/cp_client.crt
    client_key_file: controlplane/config/certs/cp_client.key
vsm:
  grpc_addr: 127.0.0.1:55051
  tls:
    enabled: true
    root_cert_file: controlplane/config/certs/ca.pem
    client_cert_file: controlplane/config/certs/cp_client.crt
    client_key_file: controlplane/config/certs/cp_client.key
restream:
  rtsp_base: rtsp://127.0.0.1:8554/
sse:
  keepalive_ms: 10000
  idle_close_ms: 0
  sources:
    interval_ms: 1000
security:
  cors:
    allowed_origins: ["*"]
  auth:
    bearer_token: "secret123"
  rate_limit:
    rps: 1

