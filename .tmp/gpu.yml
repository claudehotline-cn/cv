services:
  va:
    build:
      dockerfile: docker/va/Dockerfile.gpu
      args:\r\n        ORT_VERSION: "1.23.0"\r\n    image: cv/va:latest-gpu
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility



