global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus-self'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'controlplane'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:18080']
        labels:
          service: 'controlplane'

  - job_name: 'video-analyzer-http'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'video-analyzer'

# 如果 VA 启用了独立 Prom endpoint，请改用下方配置并注释掉上面的 video-analyzer-http
