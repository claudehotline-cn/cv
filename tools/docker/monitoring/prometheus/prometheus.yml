global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Prometheus 自身
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Controlplane 指标
  - job_name: controlplane
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:18080"]
        labels:
          service: controlplane

  # VideoAnalyzer 指标（HTTP 路由暴露 /metrics）
  - job_name: video-analyzer-http
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: video-analyzer

  # 如果 VA 启用独立 9090 Prom endpoint，请改用此 job，并注释掉上面的 video-analyzer-http
  # - job_name: video-analyzer-prom
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["host.docker.internal:9090"]
  #       labels:
  #         service: video-analyzer
